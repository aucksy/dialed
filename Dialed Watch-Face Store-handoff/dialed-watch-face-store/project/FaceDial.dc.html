<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:relative;width:100%;height:100%;border-radius:50%;background:{{face.bg}};box-shadow:0 10px 30px rgba(0,0,0,.38), inset 0 0 0 1px rgba(255,255,255,.09)">
  <div style="position:absolute;inset:4.5%;border-radius:50%;background:repeating-conic-gradient(from -1.2deg, {{face.tick}} 0deg 2.4deg, transparent 2.4deg 30deg);-webkit-mask:radial-gradient(closest-side, transparent 77%, #000 78%);mask:radial-gradient(closest-side, transparent 77%, #000 78%)"></div>
  <div style="position:absolute;left:50%;bottom:50%;width:5.5%;height:25%;margin-left:-2.75%;transform-origin:50% 100%;transform:rotate(304.5deg);border-radius:99px;background:{{face.hh}}"></div>
  <div style="position:absolute;left:50%;bottom:50%;width:4%;height:35%;margin-left:-2%;transform-origin:50% 100%;transform:rotate(57deg);border-radius:99px;background:{{face.mh}}"></div>
  <div style="position:absolute;left:50%;bottom:50%;width:1.8%;height:41%;margin-left:-0.9%;transform-origin:50% 100%;transform:rotate(186deg);border-radius:99px;background:{{face.sh}}"></div>
  <div style="position:absolute;left:50%;top:50%;width:8%;height:8%;margin:-4% 0 0 -4%;border-radius:50%;background:{{face.sh}};box-shadow:inset 0 0 0 1.5px rgba(0,0,0,.28)"></div>
  <sc-if value="{{locked}}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute;right:2%;bottom:2%;width:24%;height:24%;min-width:22px;min-height:22px;border-radius:50%;background:rgba(10,10,12,.8);border:1px solid rgba(216,188,122,.55);display:flex;align-items:center;justify-content:center">
      <svg viewBox="0 0 24 24" style="width:48%;height:48%" fill="none"><rect x="5" y="11" width="14" height="9" rx="2" stroke="#D8BC7A" stroke-width="2"></rect><path d="M8 11V8a4 4 0 0 1 8 0v3" stroke="#D8BC7A" stroke-width="2"></path></svg>
    </div>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:180,&quot;height&quot;:180},&quot;face&quot;:{&quot;editor&quot;:null,&quot;default&quot;:{&quot;bg&quot;:&quot;radial-gradient(circle at 50% 38%, #F7F3E8, #E8E2D2 70%, #DCD5C2)&quot;,&quot;tick&quot;:&quot;#26241F&quot;,&quot;hh&quot;:&quot;#26241F&quot;,&quot;mh&quot;:&quot;#26241F&quot;,&quot;sh&quot;:&quot;#C8A34E&quot;},&quot;tsType&quot;:&quot;{bg:string;tick:string;hh:string;mh:string;sh:string}&quot;},&quot;locked&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;}}"></script>
</body>
</html>
