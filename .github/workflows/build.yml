name: build

on:
  push:
    branches: [main]
    tags: ['dialed-v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'

      # facepacks/ and FaceCatalog.kt are GENERATED but committed (so the build itself needs no
      # node). That means they can silently drift from BUNDLED_FACES if someone edits the list and
      # forgets to re-run the generator — the build would happily ship the stale set. Re-run it and
      # fail on any diff, so "43/43" is enforced rather than assumed. Verification only: no build
      # step depends on node.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Verify generated facepacks + catalog are in sync
        run: |
          set -e
          node tools/gen-facepacks.mjs "$PWD"
          # --porcelain, not `git diff`: a face added to BUNDLED_FACES but never regenerated shows
          # up as an UNTRACKED facepack dir + preview, which `git diff` does not report at all.
          PATHS="facepacks app/src/main/java/com/dialed/app/catalog/FaceCatalog.kt app/src/main/res/drawable-nodpi"
          drift=$(git status --porcelain -- $PATHS)
          if [ -n "$drift" ]; then
            echo "::error::generated files are stale — run: node tools/gen-facepacks.mjs \"<repo-root>\" and commit the result"
            printf '%s\n' "$drift"
            exit 1
          fi
          echo "generated output matches the committed tree ($(ls -d facepacks/*/ | wc -l) facepacks)"

      # Phase 0 — repackage every face to the WFP naming, signed with the faces key.
      # release + minify strips the (empty) classes.dex WFP forbids; res names stay intact.
      - name: Build all facepacks
        run: |
          set -e
          TASKS=""
          for d in facepacks/*/; do TASKS="$TASKS :facepacks:$(basename "$d"):assembleRelease"; done
          echo "Building:$TASKS"
          gradle $TASKS --no-daemon --stacktrace

      # Validate each face with Google's Watch Face Push validator (fat jar, alpha09 —
      # alpha10 does not exist), extract its token, and bundle apk+token into :app assets.
      # STRICT: any face that fails validation fails the build.
      - name: Validate + tokenise + bundle faces
        run: |
          set -e
          FACES=app/src/main/assets/faces
          TOKENS=app/src/main/assets/tokens
          mkdir -p "$FACES" "$TOKENS"
          VAL_VER="1.0.0-alpha09"
          curl -fsSL -o validator-cli.jar \
            "https://dl.google.com/android/maven2/com/google/android/wearable/watchface/validator/validator-push-cli/${VAL_VER}/validator-push-cli-${VAL_VER}.jar"
          fail=0
          for d in facepacks/*/; do
            key=$(basename "$d")
            apk=$(ls "$d"build/outputs/apk/release/*.apk 2>/dev/null | head -1)
            [ -n "$apk" ] || { echo "::error::no APK for $key"; fail=1; continue; }
            out=$(java -jar validator-cli.jar --apk_path="$apk" --package_name=com.dialed.app 2>&1) || true
            token=$(printf '%s\n' "$out" | sed -n 's/.*generated token: //p' | head -1)
            if printf '%s\n' "$out" | grep -qi 'Validation is successful' && [ -n "$token" ]; then
              cp "$apk" "$FACES/${key}.apk"
              printf '%s' "$token" > "$TOKENS/${key}.token"
              echo "  ✓ $key"
            else
              echo "::error::WFP validation failed for $key"
              printf '%s\n' "$out" | grep -i 'Failed check'
              fail=1
            fi
          done
          [ "$fail" -eq 0 ] || { echo "::error::one or more faces failed WFP validation"; exit 1; }

          # Every facepack must have produced exactly one bundled apk + one token. Without this,
          # a face that silently vanished from facepacks/ would ship as a smaller store, green.
          # NB: `want` is only trustworthy because gen-facepacks.mjs hard-fails unless it emits one
          # facepack per BUNDLED_FACES entry — otherwise this would be comparing facepacks/ to itself.
          # Cross-check the catalog too, so the store, the modules and the assets must all agree.
          want=$(ls -d facepacks/*/ | wc -l)
          got_apk=$(ls "$FACES" | wc -l)
          got_tok=$(ls "$TOKENS" | wc -l)
          # `|| echo 0`: grep -c exits 1 on zero matches, which under set -e would abort here with a
          # bare exit code instead of the explicit mismatch error below.
          in_catalog=$(grep -c '^        Face(' app/src/main/java/com/dialed/app/catalog/FaceCatalog.kt || echo 0)
          echo "bundled ${got_apk}/${want} faces + ${got_tok}/${want} tokens; catalog lists ${in_catalog}"
          if [ "$got_apk" -ne "$want" ] || [ "$got_tok" -ne "$want" ] || [ "$in_catalog" -ne "$want" ]; then
            echo "::error::mismatch — facepacks=${want} apks=${got_apk} tokens=${got_tok} catalog=${in_catalog}"
            exit 1
          fi

          # Phase 2C: 43 face APKs are bundled as assets. Watch this — it is the dominant term in
          # the phone APK size and the reason to care about a 43-face store.
          echo "### Bundled faces: ${got_apk}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| what | size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---:|" >> "$GITHUB_STEP_SUMMARY"
          echo "| face APKs (assets/faces) | $(du -sh "$FACES" | cut -f1) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| tokens (assets/tokens) | $(du -sh "$TOKENS" | cut -f1) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| previews (res/drawable-nodpi) | $(du -sh app/src/main/res/drawable-nodpi | cut -f1) |" >> "$GITHUB_STEP_SUMMARY"
          echo "assets/faces  = $(du -sh "$FACES" | cut -f1)"
          echo "assets/tokens = $(du -sh "$TOKENS" | cut -f1)"
          du -sh app/src/main/res/drawable-nodpi

      - name: Build storefront (:app) with bundled faces
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      # Wear companion: WFP bridge. Both :app and :wear sign with the committed STABLE key
      # (dialed-app-debug.keystore), so every release shares one cert + applicationId
      # (com.dialed.app) — upgrades install in place and the Data Layer pairs the two APKs.
      - name: Build wear companion (:wear)
        run: gradle :wear:assembleDebug --no-daemon --stacktrace

      - name: Stage APKs
        run: |
          mkdir -p out
          NAME="${GITHUB_REF_NAME:-main}"
          cp app/build/outputs/apk/debug/app-debug.apk "out/${NAME}-phone.apk"
          cp wear/build/outputs/apk/debug/wear-debug.apk "out/${NAME}-wear.apk"
          ls -la out
          {
            echo ""
            echo "### Shipped APKs"
            echo ""
            echo "| apk | size |"
            echo "|---|---:|"
            echo "| ${NAME}-phone.apk | $(du -h "out/${NAME}-phone.apk" | cut -f1) |"
            echo "| ${NAME}-wear.apk | $(du -h "out/${NAME}-wear.apk" | cut -f1) |"
          } >> "$GITHUB_STEP_SUMMARY"

          # The real ceiling is Play's **200 MB** compressed download limit for an AAB's base module
          # (support.google.com/googleplay/android-developer/answer/9859372). 100 MB is the LEGACY raw-APK
          # limit and does NOT apply — Play requires an AAB for new apps, which is the Phase 4 lane. This
          # debug APK is the closest proxy CI has for that base module, so track it against 200, not 100.
          # Above 200 MB the fix is Play Asset/Feature Delivery (per-collection packs — which is the
          # billing model anyway), not a backend. Warn only: a sideloaded debug APK has no limit at all.
          bytes=$(stat -c%s "out/${NAME}-phone.apk")
          mb=$((bytes / 1024 / 1024))
          echo "phone APK = ${mb} MB (Play AAB base-module ceiling 200 MB; 43 faces ~= 70 MB)"
          if [ "$mb" -ge 170 ]; then
            echo "::warning::phone APK is ${mb} MB — approaching Play's 200 MB AAB base-module limit. Move the collections to Play Asset Delivery packs before adding more faces."
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "> ⚠️ phone APK ${mb} MB — approaching Play's 200 MB AAB base-module ceiling." >> "$GITHUB_STEP_SUMMARY"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: dialed-app
          path: out/*.apk

      - name: Release (dialed-v* tags only)
        if: startsWith(github.ref, 'refs/tags/dialed-v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.apk
          generate_release_notes: true
